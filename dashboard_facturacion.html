<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xpecializa · Facturación</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #f5f4f0;
    --surface:  #ffffff;
    --border:   #e2e0d8;
    --text:     #1a1916;
    --muted:    #888680;
    --accent:   #1a1916;
    --blue:     #185FA5;
    --green:    #1D9E75;
    --amber:    #BA7517;
    --red:      #D85A30;
    --font-sans: 'DM Sans', sans-serif;
    --font-mono: 'DM Mono', monospace;
    --radius:   6px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: var(--font-sans); color: var(--text); font-size: 14px; min-height: 100vh; }

  /* HEADER */
  header { background: var(--accent); color: #fff; padding: 0 2rem; height: 52px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: var(--font-mono); font-size: 13px; letter-spacing: 0.08em; opacity: 0.9; }
  .header-right { display: flex; align-items: center; gap: 16px; }
  .year-tabs { display: flex; gap: 4px; }
  .ytab { font-family: var(--font-mono); font-size: 11px; padding: 4px 12px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: transparent; color: rgba(255,255,255,0.6); cursor: pointer; transition: all 0.15s; }
  .ytab:hover { background: rgba(255,255,255,0.1); color: #fff; }
  .ytab.active { background: #fff; color: var(--accent); font-weight: 500; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); }

  /* LAYOUT */
  main { max-width: 1200px; margin: 0 auto; padding: 2rem; }

  /* KPIs */
  .kpi-grid { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 1.5rem; }
  .kpi { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 18px 20px; }
  .kpi-label { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 8px; }
  .kpi-value { font-family: var(--font-mono); font-size: 22px; font-weight: 400; color: var(--text); line-height: 1; }
  .kpi-sub { font-size: 11px; color: var(--muted); margin-top: 6px; font-family: var(--font-mono); }
  .pos { color: var(--green); } .neg { color: var(--red); } .warn { color: var(--amber); }

  /* CARDS */
  .grid-2 { display: grid; grid-template-columns: 2fr 1fr; gap: 12px; margin-bottom: 12px; }
  .grid-2b { display: grid; grid-template-columns: 3fr 2fr; gap: 12px; margin-bottom: 12px; }
  .grid-2c { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; }
  .card-title { font-size: 10px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 16px; }

  /* CHART */
  .chart-wrap { position: relative; width: 100%; }
  .leg { display: flex; gap: 14px; margin-top: 10px; flex-wrap: wrap; }
  .leg span { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
  .leg-dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* DONUT */
  .dleg { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }
  .dleg span { display: flex; align-items: center; gap: 8px; font-size: 11px; color: var(--muted); font-family: var(--font-mono); }
  .tramo-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-top: 12px; }
  .tramo { background: var(--bg); border-radius: var(--radius); padding: 10px 12px; }
  .tramo-l { font-size: 9px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .tramo-v { font-family: var(--font-mono); font-size: 13px; font-weight: 400; }

  /* CLIENTES */
  .bar-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
  .bar-name { font-size: 11px; color: var(--muted); width: 150px; flex-shrink: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-family: var(--font-mono); }
  .bar-track { flex: 1; height: 5px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 3px; transition: width 0.4s ease; }
  .bar-val { font-size: 11px; color: var(--muted); width: 72px; text-align: right; flex-shrink: 0; font-family: var(--font-mono); }

  /* VENCIMIENTOS */
  .vc-row { display: flex; align-items: center; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 11px; }
  .vc-row:last-child { border-bottom: none; }
  .vc-date { font-family: var(--font-mono); color: var(--muted); width: 60px; flex-shrink: 0; }
  .vc-cli { color: var(--muted); flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; padding: 0 10px; }
  .vc-amt { font-family: var(--font-mono); font-weight: 500; color: var(--text); text-align: right; flex-shrink: 0; }
  .vc-days { font-family: var(--font-mono); font-size: 10px; width: 42px; text-align: right; flex-shrink: 0; }
  .ssep { font-size: 9px; font-weight: 500; color: var(--muted); text-transform: uppercase; letter-spacing: 0.07em; background: var(--bg); padding: 3px 8px; border-radius: 3px; margin: 8px 0 4px; font-family: var(--font-mono); }

  /* PROYECCIÓN */
  .pb { margin-bottom: 14px; }
  .pb-row { display: flex; align-items: center; justify-content: space-between; font-size: 11px; margin-bottom: 5px; }
  .pb-label { color: var(--muted); }
  .pb-val { font-family: var(--font-mono); font-weight: 500; color: var(--text); }
  .pb-bg { width: 100%; height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; }
  .pb-in { height: 100%; border-radius: 3px; transition: width 0.5s ease; }
  .info-box { background: var(--bg); border-radius: var(--radius); padding: 10px 12px; font-size: 11px; color: var(--muted); font-family: var(--font-mono); }

  /* LOADING */
  .loading { text-align: center; padding: 4rem; font-family: var(--font-mono); font-size: 12px; color: var(--muted); letter-spacing: 0.05em; }
  .error-msg { background: #fff0ec; border: 1px solid #fbc4b4; border-radius: var(--radius); padding: 12px 16px; font-size: 12px; color: var(--red); font-family: var(--font-mono); margin-bottom: 1rem; }
</style>
</head>
<body>

<header>
  <span class="logo">XPECIALIZA · FACTURACIÓN</span>
  <div class="header-right">
    <div class="year-tabs" id="yearTabs">
      <button class="ytab active" onclick="setYear(2026,this)">2026</button>
      <button class="ytab" onclick="setYear(2025,this)">2025</button>
      <button class="ytab" onclick="setYear(2024,this)">2024</button>
    </div>
    <div class="status-dot" id="statusDot" title="Conectado a Supabase"></div>
  </div>
</header>

<main>
  <div id="errorBox" style="display:none;" class="error-msg"></div>
  <div id="loadingMsg" class="loading">Cargando datos...</div>
  <div id="dashContent" style="display:none;">

    <div class="kpi-grid" id="kpiGrid"></div>

    <div class="grid-2">
      <div class="card">
        <div class="card-title" id="chartTitle">Facturación mensual · s/IVA</div>
        <div class="chart-wrap" style="height:200px;"><canvas id="lineChart"></canvas></div>
        <div class="leg" id="lineLeg"></div>
      </div>
      <div class="card">
        <div class="card-title">Pendiente de cobro · hoy</div>
        <div class="chart-wrap" style="height:120px;"><canvas id="donutChart"></canvas></div>
        <div class="dleg" id="dnutLeg"></div>
        <div class="tramo-grid" id="tramoGrid"></div>
      </div>
    </div>

    <div class="grid-2b">
      <div class="card">
        <div class="card-title" id="clientTitle">Clientes · facturación acumulada s/IVA</div>
        <div id="clientBars"></div>
      </div>
      <div class="card">
        <div class="card-title">Proyección y comparativa</div>
        <div id="projContent"></div>
      </div>
    </div>

    <div class="card">
      <div class="card-title">Vencimientos próximos · pendiente de cobro</div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:24px;" id="vcContent"></div>
    </div>

  </div>
</main>

<script>
const SUPABASE_URL = 'https://xsqzmtbecsbjqrcxfzbl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhzcXptdGJlY3NianFyY3hmemJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUxNTA1OTUsImV4cCI6MjA5MDcyNjU5NX0.LJ-eBd2oxfXWBlatD4-2eqKIq6CuR7gv6Mv87DpXFf8';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

const COL = { 2024:'#185FA5', 2025:'#1D9E75', 2026:'#1a1916' };
const prevY = { 2026:2025, 2025:2024, 2024:null };
const MONTHS = ['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

let activeYear = 2026;
let allData = {};
let lineChart, donutChart;

function es(n, dec=2) {
  if (n === null || n === undefined) return '—';
  return Number(n).toLocaleString('es-ES',{minimumFractionDigits:dec,maximumFractionDigits:dec}) + ' €';
}
function es0(n) { return es(n,0); }
function esK1(n) { return (Number(n)/1000).toLocaleString('es-ES',{minimumFractionDigits:1,maximumFractionDigits:1})+'k €'; }
function esKax(n) { return (Number(n)/1000).toLocaleString('es-ES',{minimumFractionDigits:0,maximumFractionDigits:0})+'k'; }

async function loadData() {
  try {
    // Facturación mensual por año
    const { data: monthly, error: e1 } = await db
      .from('v_facturacion_mensual')
      .select('anio,mes,base_total,total_con_iva')
      .order('anio').order('mes');
    if (e1) throw e1;

    // Clientes por año
    const { data: clients, error: e2 } = await db
      .from('v_facturacion_por_cliente_anio')
      .select('cliente_id,nombre_corto,anio,base_total')
      .order('anio').order('base_total', { ascending: false });
    if (e2) throw e2;

    // Pendientes
    const { data: pending, error: e3 } = await db
      .from('v_pendientes_cobro')
      .select('factura_id,cliente,fecha_vencimiento,base_imponible,total_con_iva,dias_vencido,tramo')
      .order('fecha_vencimiento');
    if (e3) throw e3;

    // Procesar monthly por año
    const monthly2024 = Array(12).fill(0);
    const monthly2025 = Array(12).fill(0);
    const monthly2026 = Array(12).fill(0);
    let ytd = {2024:0, 2025:0, 2026:0};
    let full = {2024:0, 2025:0, 2026:0};

    monthly.forEach(r => {
      const m = r.mes - 1;
      const v = parseFloat(r.base_total) || 0;
      if (r.anio === 2024) { monthly2024[m] = v; full[2024] += v; }
      if (r.anio === 2025) { monthly2025[m] = v; full[2025] += v; }
      if (r.anio === 2026) { monthly2026[m] = v; full[2026] += v; }
    });

    // YTD: meses hasta el mes actual del año en curso, mismo periodo para anteriores
    const today = new Date();
    const currentMonth = today.getMonth(); // 0-indexed, abril = 3
    ytd[2026] = monthly2026.slice(0, currentMonth + 1).reduce((s,v)=>s+v,0);
    ytd[2025] = monthly2025.slice(0, currentMonth + 1).reduce((s,v)=>s+v,0);
    ytd[2024] = monthly2024.slice(0, currentMonth + 1).reduce((s,v)=>s+v,0);

    // Procesar clientes por año
    const clientsByYear = {2024:[], 2025:[], 2026:[]};
    [2024,2025,2026].forEach(yr => {
      const yearClients = clients.filter(c => c.anio === yr);
      clientsByYear[yr] = yearClients
        .sort((a,b) => b.base_total - a.base_total)
        .slice(0, 12);
    });

    // Procesar pendientes
    const totalPend = pending.reduce((s,r) => s + parseFloat(r.total_con_iva||0), 0);
    const tramos = {
      no_vencido: pending.filter(r=>r.tramo==='no_vencido').reduce((s,r)=>s+parseFloat(r.total_con_iva||0),0),
      menos_30:   pending.filter(r=>r.tramo==='menos_30').reduce((s,r)=>s+parseFloat(r.total_con_iva||0),0),
      d3060:      pending.filter(r=>r.tramo==='30_60').reduce((s,r)=>s+parseFloat(r.total_con_iva||0),0),
      d6090:      pending.filter(r=>r.tramo==='60_90').reduce((s,r)=>s+parseFloat(r.total_con_iva||0),0),
      mas90:      pending.filter(r=>r.tramo==='mas_90').reduce((s,r)=>s+parseFloat(r.total_con_iva||0),0),
    };

    allData = {
      monthly: { 2024:monthly2024, 2025:monthly2025, 2026:monthly2026 },
      ytd, full,
      clients: clientsByYear,
      pending, totalPend, tramos,
      currentMonth
    };

    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('dashContent').style.display = 'block';
    document.getElementById('statusDot').style.background = '#1D9E75';

    renderAll(activeYear);

  } catch(err) {
    document.getElementById('loadingMsg').style.display = 'none';
    document.getElementById('statusDot').style.background = '#D85A30';
    const box = document.getElementById('errorBox');
    box.style.display = 'block';
    box.textContent = 'Error al conectar con Supabase: ' + (err.message || JSON.stringify(err));
  }
}

function renderKPIs(yr) {
  const prev = prevY[yr];
  const ytd  = allData.ytd[yr];
  const ytdP = prev ? allData.ytd[prev] : null;
  const m    = yr === 2026 ? allData.currentMonth + 1 : 12;
  const delta = ytdP ? ((ytd - ytdP) / ytdP * 100) : null;
  const dH = delta !== null
    ? `<span class="${delta>=0?'pos':'neg'}">${delta>=0?'+':''}${delta.toFixed(1)}%</span> vs ${prev} mismo periodo`
    : '—';

  document.getElementById('kpiGrid').innerHTML = `
    <div class="kpi">
      <div class="kpi-label">${yr===2026?'YTD '+new Date().toLocaleString('es-ES',{month:'short'})+' · s/IVA':'Facturación '+yr+' · s/IVA'}</div>
      <div class="kpi-value">${es0(ytd)}</div>
      <div class="kpi-sub">${dH}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">${prev?prev+' mismo periodo':'Año anterior'}</div>
      <div class="kpi-value">${ytdP?es0(ytdP):'—'}</div>
      <div class="kpi-sub">${prev?m+' meses':'—'}</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Pendiente de cobro (hoy)</div>
      <div class="kpi-value warn">${es(allData.totalPend)}</div>
      <div class="kpi-sub">${allData.pending.length} facturas abiertas</div>
    </div>
    <div class="kpi">
      <div class="kpi-label">Media mensual · s/IVA</div>
      <div class="kpi-value">${es0(ytd/m)}</div>
      <div class="kpi-sub">${ytdP?'vs '+es0(ytdP/m)+' en '+prev:'—'}</div>
    </div>`;
}

function renderLine(yr) {
  const prev = prevY[yr];
  const ds = [{
    label: String(yr),
    data: allData.monthly[yr],
    backgroundColor: COL[yr] + 'cc',
    borderRadius: 3,
    borderSkipped: false,
    type: 'bar'
  }];
  if (prev) ds.push({
    label: String(prev),
    data: allData.monthly[prev],
    borderColor: COL[prev] + 'aa',
    backgroundColor: 'transparent',
    borderWidth: 1.5,
    borderDash: [4,3],
    pointRadius: 2,
    pointBackgroundColor: COL[prev],
    type: 'line',
    tension: 0.3
  });
  if (lineChart) lineChart.destroy();
  lineChart = new Chart(document.getElementById('lineChart'), {
    type: 'bar',
    data: { labels: MONTHS, datasets: ds },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: v => v.dataset.label+': '+es(v.raw) } } },
      scales: {
        x: { ticks: { font: { size: 10, family: 'DM Mono' } }, grid: { display: false } },
        y: { ticks: { font: { size: 10, family: 'DM Mono' }, callback: v => esKax(v) }, grid: { color: 'rgba(0,0,0,0.05)' } }
      }
    }
  });
  let l = `<span><span class="leg-dot" style="background:${COL[yr]}"></span>${yr}</span>`;
  if (prev) l += `<span><span class="leg-dot" style="background:${COL[prev]};opacity:0.6"></span>${prev} (línea)</span>`;
  document.getElementById('lineLeg').innerHTML = l;
}

function renderDonut() {
  const t = allData.tramos;
  const tramosDef = [
    { label:'No vencido', val:t.no_vencido, color:'#1D9E75' },
    { label:'< 30 días',  val:t.menos_30,   color:'#BA7517' },
    { label:'30–60 días', val:t.d3060,       color:'#D85A30' },
  ];
  if (donutChart) donutChart.destroy();
  donutChart = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: {
      labels: tramosDef.map(t=>t.label),
      datasets: [{ data: tramosDef.map(t=>t.val), backgroundColor: tramosDef.map(t=>t.color), borderWidth: 0, hoverOffset: 4 }]
    },
    options: {
      responsive: true, maintainAspectRatio: false, cutout: '70%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: v=>' '+es(v.raw) } } }
    }
  });
  document.getElementById('dnutLeg').innerHTML = tramosDef.map(t =>
    `<span><span class="leg-dot" style="background:${t.color};border-radius:50%;width:8px;height:8px;"></span>${t.label} · <strong style="color:#1a1916;">${es(t.val)}</strong></span>`
  ).join('');
  document.getElementById('tramoGrid').innerHTML = tramosDef.map(t =>
    `<div class="tramo"><div class="tramo-l">${t.label}</div><div class="tramo-v" style="color:${t.val>0?t.color:'#ccc'};">${t.val>0?es(t.val):'—'}</div></div>`
  ).join('');
}

function renderClients(yr) {
  const cl = allData.clients[yr];
  document.getElementById('clientTitle').textContent = 'Clientes '+yr+' · facturación acumulada s/IVA';
  if (!cl || cl.length === 0) {
    document.getElementById('clientBars').innerHTML = '<p style="color:var(--muted);font-size:12px;">Sin datos</p>';
    return;
  }
  const mx = cl[0].base_total;
  document.getElementById('clientBars').innerHTML = cl.map(c => `
    <div class="bar-row">
      <div class="bar-name" title="${c.nombre_corto}">${c.nombre_corto}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${Math.round(c.base_total/mx*100)}%;background:${COL[yr]};"></div></div>
      <div class="bar-val">${esK1(c.base_total)}</div>
    </div>`).join('');
}

function renderVC() {
  const today = new Date();
  const upcoming = allData.pending
    .filter(r => new Date(r.fecha_vencimiento) >= today)
    .sort((a,b) => new Date(a.fecha_vencimiento) - new Date(b.fecha_vencimiento));

  const groups = {};
  upcoming.forEach(r => {
    const d = new Date(r.fecha_vencimiento);
    const key = d.toLocaleDateString('es-ES',{day:'numeric',month:'short'});
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  const keys = Object.keys(groups).slice(0, 2);
  const cols = keys.map(key => {
    const rows = groups[key];
    const total = rows.reduce((s,r)=>s+parseFloat(r.total_con_iva||0),0);
    const dias = Math.round((new Date(rows[0].fecha_vencimiento)-today)/(1000*60*60*24));
    let h = `<div class="ssep">${key} · <strong>${es(total)}</strong></div>`;
    h += rows.map(r => `<div class="vc-row">
      <span class="vc-date">${key}</span>
      <span class="vc-cli">${r.cliente}</span>
      <span class="vc-amt">${es(r.total_con_iva)}</span>
      <span class="vc-days ${dias<=30?'warn':''}">${dias}d</span>
    </div>`).join('');
    return `<div>${h}</div>`;
  });

  if (cols.length === 0) {
    document.getElementById('vcContent').innerHTML = '<p style="color:var(--muted);font-size:12px;">Sin vencimientos próximos.</p>';
  } else {
    document.getElementById('vcContent').innerHTML = cols.join('');
  }
}

function renderProj(yr) {
  const ytd  = allData.ytd[yr];
  const prev = prevY[yr];
  const m    = yr === 2026 ? allData.currentMonth + 1 : 12;
  let h = '';

  if (yr === 2026) {
    const pace = ytd / m;
    const proj = Math.round(ytd + pace * (12 - m));
    const pF   = allData.full[2025];
    const pct26 = Math.round(ytd / proj * 100);
    const pct25 = Math.round(allData.ytd[2025] / pF * 100);
    const dvs25 = ((ytd - allData.ytd[2025]) / allData.ytd[2025] * 100);
    const dproj = ((proj - pF) / pF * 100);
    h = `
      <div class="pb">
        <div class="pb-row"><span class="pb-label">Proyección 2026</span><span class="pb-val">${es0(proj)}</span></div>
        <div class="pb-row"><span style="font-size:10px;color:var(--muted);">Acumulado ${m} meses · ${pct26}%</span><span style="font-size:10px;font-family:var(--font-mono);">${es0(ytd)}</span></div>
        <div class="pb-bg"><div class="pb-in" style="width:${pct26}%;background:${COL[2026]};"></div></div>
      </div>
      <div class="pb">
        <div class="pb-row"><span class="pb-label">Referencia 2025</span><span class="pb-val">${es0(pF)}</span></div>
        <div class="pb-row"><span style="font-size:10px;color:var(--muted);">YTD 2025 ${m} meses · ${pct25}%</span><span style="font-size:10px;font-family:var(--font-mono);">${es0(allData.ytd[2025])}</span></div>
        <div class="pb-bg"><div class="pb-in" style="width:${pct25}%;background:${COL[2025]};"></div></div>
      </div>
      <div class="info-box">
        YTD vs año anterior: <span class="${dvs25>=0?'pos':'neg'}">${dvs25>=0?'+':''}${dvs25.toFixed(1)}%</span>
        &nbsp;·&nbsp; Proyección vs 2025: <span class="${dproj>=0?'pos':'neg'}">${dproj>=0?'+':''}${dproj.toFixed(1)}%</span>
      </div>`;
  } else if (yr === 2025) {
    const f  = allData.full[2025];
    const pF = allData.full[2024];
    const d  = ((f - pF) / pF * 100);
    h = `
      <div class="pb">
        <div class="pb-row"><span class="pb-label">Total 2025 s/IVA</span><span class="pb-val">${es0(f)}</span></div>
        <div class="pb-bg"><div class="pb-in" style="width:100%;background:${COL[2025]};"></div></div>
      </div>
      <div class="pb">
        <div class="pb-row"><span class="pb-label">Total 2024 s/IVA</span><span class="pb-val">${es0(pF)}</span></div>
        <div class="pb-bg"><div class="pb-in" style="width:${Math.round(pF/f*100)}%;background:${COL[2024]};"></div></div>
      </div>
      <div class="info-box">Crecimiento 2025 vs 2024: <span class="pos">+${d.toFixed(1)}%</span></div>`;
  } else {
    h = `<div style="font-size:12px;color:var(--muted);padding-top:20px;text-align:center;font-family:var(--font-mono);">2024 es el primer año con datos completos.</div>`;
  }
  document.getElementById('projContent').innerHTML = h;
}

function renderAll(yr) {
  renderKPIs(yr);
  renderLine(yr);
  renderDonut();
  renderClients(yr);
  renderVC();
  renderProj(yr);
}

function setYear(yr, btn) {
  activeYear = yr;
  document.querySelectorAll('.ytab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderKPIs(yr);
  renderLine(yr);
  renderClients(yr);
  renderProj(yr);
}

loadData();
</script>
</body>
</html>
